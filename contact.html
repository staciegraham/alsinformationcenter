<script>
    // Toggle menu on mobile
    const hamburger = document.getElementById('hamburger');

    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('show');
    });
</script>

<div class="container">
    <h2>Send us a message</h2>
     <!-- Contact Form using Web3Forms API -->
      <!-- This form sends submissions directly to my email via Web3Forms without needing a backend server. -->
       <!-- Docs: https://web3forms.com/ -->
    <form action="https://api.web3forms.com/submit" method="POST"> 
  <input type="hidden" name="access_key" value="9af02803-6129-4fc3-9661-ce43fae5d82d">

  <label for="name">Name</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" required>

  <label for="message">Message</label>
  <textarea id="message" name="message" rows="5" required></textarea>

  <button type="submit">Send Message</button>
</form>
</div>
