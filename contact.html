<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->
<html lang="en">
<head>
    <!-- Sets the character encoding to UTF-8 (supports most languages and symbols) -->
    <meta charset="UTF-8">

    <!-- Ensures the page is responsive and scales correctly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title of the web page (appears in browser tab and search results) -->
    <title>Contact - ALS Information</title>

    <!-- Link to external CSS stylesheet for page styling -->
    <link rel="stylesheet" href="style.css">

    <!-- Link to external JavaScript file; 'defer' ensures it loads after HTML -->
    <script src="script.js" defer></script>

    <!-- Accessibility widget for improved usability -->
    <script src="https://cdn.jsdelivr.net/npm/accessibility-widgets@latest/widget.js"></script>
</head>

<body>
<header>
    <!-- Page heading and short description -->
    <h1>⚛Contact Us</h1>
    <p>Reach out to us for more information or support</p>
</header>

<!-- Navigation section -->
<nav>
    <!-- Navigation links container -->
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="research.html">Research</a>
        <a href="resources.html">Resources</a>
        <a href="symptoms.html">Symptoms</a>
        <a href="faq.html">FAQ</a>
        <a href="references.html">References</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Hamburger icon for mobile navigation toggle -->
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<!-- Main content container -->
<div class="container">
    <h2>Send us a message</h2>

    <!-- Contact Form using Web3Forms API -->
    <!-- This form sends submissions directly to your email without needing a backend server -->
    <!-- Documentation: https://web3forms.com/ -->
    <form action="https://api.web3forms.com/submit" method="POST">

        <!-- Hidden access key required by Web3Forms -->
        <input type="hidden" name="access_key" value="9af02803-6129-4fc3-9661-ce43fae5d82d">

        <!-- User name field -->
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <!-- User email field -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <!-- Message textarea -->
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <!-- Submit button -->
        <button type="submit">Send Message</button>
    </form>
</div>

</body>

<!-- Footer section -->
<footer>
    <p>&copy; 2026 ALS Information Center. All rights reserved 𓆩♡𓆪</p>
</footer>
</html>
